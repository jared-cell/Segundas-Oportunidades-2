<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Adopciones</title>
  <link rel="stylesheet" href="styles/AdminAdopciones.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="top-bar">
    <a href="admin_dashboard.html" class="back-button">← Volver al Panel de Administración</a>
  </div>

  <div class="container">
    <h1>Solicitudes de Adopción</h1>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Adoptante</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Perrito</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Ana López</td>
            <td>ana.lopez@example.com</td>
            <td>555-1234</td>
            <td>Luna</td>
            <td><span class="status pendiente">Pendiente</span></td>
            <td>
              <button class="btn aprobar">✅ Aprobar</button>
              <button class="btn rechazar">❌ Rechazar</button>
            </td>
          </tr>
          <tr>
            <td>José García</td>
            <td>jose.garcia@example.com</td>
            <td>555-5678</td>
            <td>Max</td>
            <td><span class="status aprobada">Aprobada</span></td>
            <td>
              <button class="btn ver">👁️ Ver Detalles</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
