<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Donación</title>
  <link rel="stylesheet" href="styles/Reporte.css">
</head>
<body>

<div class="formulario">
  <h1>Formulario de reportes por maltrato animal</h1>

  <form id="formReporte" class="contenedor" novalidate>

    <!-- SECCIÓN: Datos personales -->
    <div class="seccion">
      <h2>Información Personal</h2>

      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" readonly placeholder="Ej. Juan Pérez">
      <span class="error" id="errorNombre"></span>

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" readonly placeholder="Ej. correo@ejemplo.com">
      <span class="error" id="errorEmail"></span>
    </div>

    <!-- SECCIÓN: Donación económica -->
    <div class="seccion">
      <h2>Motivo de maltrato</h2>
      <div class="checkbox-group">
        <label><input type="radio" name="tipodemaltrato" value="abandono">Abandono</label>
        <label><input type="radio" name="tipodemaltrato" value="malnutricion">Malnutricion</label>
        <label><input type="radio" name="tipodemaltrato" value="agrecionfisica">Agreciones fisicas</label>
        <label><input type="radio" name="tipodemaltrato" value="condicion">Condición insalubre</label>
        <label><input type="radio" name="tipodemaltrato" value="atencion">Falta de atención veterinaria</label>
        <label><input type="radio" name="tipodemaltrato" value="otro">Otro</label>
      </div>
    <!-- SECCIÓN: Material donado -->
    <div class="seccion">
      <h2>Datos del maltrato</h2>
      <label for="fecha">Fecha aproximada del incidente</label>
      <input type="date"><br><br>
      <label>Tipo de pruebas</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="pruebas[]" value="fotografias">Fotografias</label>
        <label><input type="checkbox" name="pruebas[]" value="videos">Videos</label>
        <label><input type="checkbox" name="pruebas[]" value="testigos">Testigos</label>

      </div>

      <label for="pruebasOtro">Otro (especificar):</label>
      <textarea id="pruebasOtro" name="pruebasOtro" rows="3" placeholder="Describe otro tipo de pruebas"></textarea>
    </div>

    <!-- Botón de enviar -->
    <div class="boton-contenedor">
      <button type="submit">Enviar Donación</button>
    </div>

  </form>
</div>

<!-- SCRIPT VALIDACIÓN SIMPLE -->
</body>
</html>
