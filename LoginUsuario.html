<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/LoginUsuario.css">
</head>
<body>
    <div class="container">
        <img src="imagenes/Loging.jpg" alt="Logo del albergue" style="width: 100px; display: block; margin: 0 auto;">
        <h2>Iniciar Sesión</h2>
        <div class="form-group">
            <label for="usuario">Correo</label>
            <input type="text" id="usuario" placeholder="Introduce tu Correo" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="Introduce tu contraseña" autocomplete="off">
        </div>
        <button onclick="iniciarSesion()">Entrar</button>
        <p><a href="CrearCuenta.html">¿No tienes cuenta? Crear cuenta</a></p>
    </div>

    <script>
        const administradores = [
            { usuario: 'jared', contraseña: '1234' },
            { usuario: 'alondra', contraseña: '1234' },
            { usuario: 'michel', contraseña: '1234' },
            { usuario: 'angel', contraseña: '1234' }
        ];

        function iniciarSesion() {
            const usuario = document.getElementById('usuario').value;
            const contraseña = document.getElementById('password').value;

            if (!usuario || !contraseña) {
                alert('Por favor, completa todos los campos.');
                return;
            }

            const correoRegex = /^[a-zA-Z0-9@._-]+$/;
            if (!correoRegex.test(usuario)) {
                alert('El campo de correo solo puede contener letras, números, caracteres especiales y el símbolo @.');
                return;
            }

            const contraseñaRegex = /^[a-zA-Z0-9]+$/;
            if (!contraseñaRegex.test(contraseña)) {
                alert('El campo de contraseña solo puede contener letras y números.');
                return;
            }

            const admin = administradores.find(admin => admin.usuario === usuario && admin.contraseña === contraseña);

            if (admin) {
                alert(`Bienvenido, administrador ${usuario}.`);
                window.location.href = 'admin_dashboard.html'; 
                return;
            }

            if (usuario === 'usuario' && contraseña === 'usuario') {
                alert('Bienvenido, usuario.');
                window.location.href = 'menu.html'; 
                return;
            }

            alert('Usuario o contraseña incorrectos.');
        }
    </script>
</body>
</html>
